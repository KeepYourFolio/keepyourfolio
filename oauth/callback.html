<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>KYF — Connexion Google</title>
  <style>
    body { margin:0; display:flex; align-items:center; justify-content:center; min-height:100vh;
      font-family:'IBM Plex Mono',monospace; background:#0d1117; color:#e6edf3; }
    .box { text-align:center; padding:40px; }
    .icon { font-size:48px; margin-bottom:16px; }
    .msg  { font-size:14px; color:#8b949e; margin-top:8px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon" id="icon">⏳</div>
    <div id="title" style="font-size:16px;font-weight:700">Connexion en cours...</div>
    <div class="msg" id="msg">Vous pouvez fermer cette fenêtre</div>
  </div>
  <script>
    // Récupérer le token depuis le hash de l'URL
    const hash   = window.location.hash.slice(1);
    const params = new URLSearchParams(hash);
    const token  = params.get('access_token');
    const state  = params.get('state');
    const error  = params.get('error');

    if(token){
      // Envoyer le token à la fenêtre parente
      if(window.opener){
        window.opener.postMessage({ type:'kyf-oauth-callback', access_token:token, state }, '*');
      }
      document.getElementById('icon').textContent  = '✅';
      document.getElementById('title').textContent = 'Connecté !';
      document.getElementById('msg').textContent   = 'Retour à KYF...';
      setTimeout(()=>window.close(), 1500);
    } else if(error){
      if(window.opener){
        window.opener.postMessage({ type:'kyf-oauth-callback', error }, '*');
      }
      document.getElementById('icon').textContent  = '❌';
      document.getElementById('title').textContent = 'Erreur';
      document.getElementById('msg').textContent   = error;
      setTimeout(()=>window.close(), 3000);
    } else {
      document.getElementById('icon').textContent  = '⚠️';
      document.getElementById('title').textContent = 'Paramètres manquants';
    }
  </script>
</body>
</html>
